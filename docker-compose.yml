services:
  postgres:
    image: postgres:16-alpine
    container_name: plotkeys-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: plotkeys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - plotkeys_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plotkeys"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  plotkeys_postgres_data:
